<div class="p-3 px-4 sm:px-6 lg:ml-[20px]">

  <!-- Row 1: Manage Grades, Manage Subjects, Grade Structure, Manage Exams -->
  <div class="flex flex-col sm:flex-row gap-[20px] mb-[5px]">
    <button
      *ngFor="let c of [cards[0], cards[1], cards[2], cards[3]]"
      class="bg-white shadow-md rounded-[23px] p-[30px] hover:shadow-lg transition text-left w-full sm:w-[380px] h-[211px] opacity-100 flex flex-col justify-between cursor-pointer"
      (click)="goTo(c.path)"
    >
      <div class="flex items-center gap-3 mb-1">
        <div class="w-16 h-16 sm:w-20 sm:h-20 flex items-center justify-center">
          <img [src]="c.icon" alt="icon" class="w-full h-full object-contain" (error)="onImageError($event)" />
        </div>
      </div>
      <h3 class="mb-1 font-[Fredoka] font-bold text-[35px] leading-[50px] tracking-[-0.4px] text-left align-middle text-[#374151] whitespace-nowrap">
        {{ c.title }}
      </h3>
      <p class="font-[Fredoka] font-normal text-[20px] leading-[39px] tracking-[-0.4px] text-left align-middle text-[#374151]">
        {{ c.desc }}
      </p>
    </button>
  </div>

  <!-- Row 2: Subscription Plan -->
  <div class="flex flex-col sm:flex-row gap-[20px]">
    <button
      *ngFor="let c of [cards[4]]"
      class="bg-white shadow-md rounded-[23px] p-[30px] hover:shadow-lg transition text-left w-full sm:w-[380px] h-[211px] opacity-100 flex flex-col justify-between cursor-pointer"
      (click)="goTo(c.path)"
    >
      <div class="flex items-center gap-3 mb-1">
        <div class="w-16 h-16 sm:w-20 sm:h-20 flex items-center justify-center">
          <img [src]="c.icon" alt="icon" class="w-full h-full object-contain" (error)="onImageError($event)" />
        </div>
      </div>
      <h3 class="mb-1 font-[Fredoka] font-bold text-[35px] leading-[50px] tracking-[-0.4px] text-left align-middle text-[#374151] whitespace-nowrap">
        {{ c.title }}
      </h3>
      <p class="font-[Fredoka] font-normal text-[20px] leading-[39px] tracking-[-0.4px] text-left align-middle text-[#374151]">
        {{ c.desc }}
      </p>
    </button>
  </div>

</div>
